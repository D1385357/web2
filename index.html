<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Twitch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main-content">
    <h1>這裡是背景頁面（例如 Twitch）</h1>
</div>

<div class="modal-overlay"></div>
<div class="login-container">

        <div class="title">
            <img src="img/twitch.png">
            <h2>登入 Twitch</h2>
        </div>

        <div class="input-group">
            <label>使用者名稱</label>
            <input type="text" id="user">
        </div>

        <div class="input-group">
            <label>密碼</label>
            <div class="input-wrapper">
                <input type="password" id="pass">
                <span class="toggle-eye" id="toggleEye">👁</span>
            </div>
        </div>

        <div class="help-row">
            <a href="#" class="help-link">無法登入嗎</a>
        </div>

        <button class="btn" id="loginBtn" disabled>登入</button>

        <div class="divider">或者</div>

        <button class="btn alt-btn">
            <img src="img/google.png"> 使用 Google 登入
        </button>

        <button class="btn alt-btn">
            <img src="img/amazon.png"> 使用 Amazon 登入
        </button>

        <button class="btn alt-btn">
            <img src="img/apple.png"> 使用 Apple 登入
        </button>

        <div class="signup">
            <span>還沒有帳號嗎？註冊</span>
        </div>
</div>

<script src="script.js"></script>
</body>
</html>
